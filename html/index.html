<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed's Coffee Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        nav {
            border-bottom: 2px solid #000;
            padding: 10px 0;
            margin-bottom: 20px;
        }
        
        nav a {
            text-decoration: underline;
            color: blue;
            margin-right: 15px;
        }
        
        h1 {
            font-size: 24px;
        }
        
        fieldset {
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 15px 0;
            margin-bottom: 20px;
        }
        
        legend {
            font-weight: bold;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #999;
            width: 100%;
            box-sizing: border-box;
        }
        
        textarea {
            height: 80px;
            resize: vertical;
        }
        
        input[type="radio"],
        input[type="checkbox"] {
            margin-right: 8px;
            margin-left: 20px;
        }
        
        button {
            padding: 8px 15px;
            margin-right: 10px;
            background-color: #f0f0f0;
            border: 1px solid #000;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#main">Main</a>
        <a href="#order">Order</a>
        <a href="#contact">Contact</a>
    </nav>

    <h1>Ahmed's Coffee Shop</h1>
    <p>We serve fresh coffee daily. Order now and get it within 30 minutes.</p>

    <form>
        
        <fieldset>
            <legend>Your Information</legend>
            
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">
            
            <label for="address">Address:</label>
            <input type="text" id="address" name="address">
            
            <label for="phone">Telephone Number:</label>
            <input type="tel" id="phone" name="phone">
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
            
            <label for="notes">Special Requests:</label>
            <textarea id="notes" name="notes"></textarea>
        </fieldset>

        <fieldset>
            <legend>Choose Your Coffee</legend>
            
            <h3>Coffee Type (Choose one):</h3>
            
            <input type="radio" id="espresso" name="coffee" value="Espresso">
            <label for="espresso">Espresso</label>
            
            <input type="radio" id="americano" name="coffee" value="Americano">
            <label for="americano">Americano</label>
            
            <input type="radio" id="latte" name="coffee" value="Latte">
            <label for="latte">Latte</label>
            
            <input type="radio" id="cappuccino" name="coffee" value="Cappuccino">
            <label for="cappuccino">Cappuccino</label>
            
            <input type="radio" id="macchiato" name="coffee" value="Macchiato">
            <label for="macchiato">Macchiato</label>

            <h3>Size (Choose one):</h3>
            
            <input type="radio" id="small" name="size" value="Small">
            <label for="small">Small (8oz)</label>
            
            <input type="radio" id="medium" name="size" value="Medium">
            <label for="medium">Medium (12oz)</label>
            
            <input type="radio" id="large" name="size" value="Large">
            <label for="large">Large (16oz)</label>

            <h3>Add-ons (Choose as many as you want):</h3>
            
            <input type="checkbox" id="honey" name="addons" value="Honey">
            <label for="honey">Honey</label>
            
            <input type="checkbox" id="vanilla" name="addons" value="Vanilla">
            <label for="vanilla">Vanilla Syrup</label>
            
            <input type="checkbox" id="chocolate" name="addons" value="Chocolate">
            <label for="chocolate">Chocolate</label>
            
            <input type="checkbox" id="caramel" name="addons" value="Caramel">
            <label for="caramel">Caramel</label>
            
            <input type="checkbox" id="whipped" name="addons" value="Whipped Cream">
            <label for="whipped">Whipped Cream</label>
            
            <input type="checkbox" id="almond" name="addons" value="Almond Milk">
            <label for="almond">Almond Milk</label>

            <h3>How many coffees:</h3>
            <input type="number" id="quantity" name="quantity" min="1" value="1">
        </fieldset>

        <button type="submit">Order Coffee!</button>
        <button type="reset">Reset</button>
    </form>

</body>
</html>
